icons_format = "{icon}"

[theme]
theme = "solarized-dark"
[theme.overrides]
idle_bg = "#123456"
idle_fg = "#abcdef"

[icons]
icons = "awesome4"
[icons.overrides]
bat = ["蟀値", "蟀伜", "蟀伝", "蟀伡", "蟀伣", "蟀伨", "蟀伩", "蟀個", "蟀倎", "蟀倐","蟀伖"]
bat_charging = ["蟀", "蟀", "蟀倖", "蟀倗", "蟀倛", "蟀", "蟀倝", "蟀", "蟀倞", "蟀倠", "蟀倕"]

[[block]]
block = "cpu"
info_cpu = 20
warning_cpu = 50
critical_cpu = 90

[[block]]
block = "disk_space"
path = "/"
info_type = "available"
alert_unit = "GB"
interval = 20
warning = 20.0
alert = 10.0
format = " $icon root: $available.eng(w:2) "

[[block]]
block = "battery"
format = " BAT: $icon ({$time_remaining.dur(hms:true, min_unit:m)|}) "
full_format = " BAT: $icon ({$time_remaining.dur(hms:true, min_unit:m)|}) "
device = "DisplayDevice"
driver = "upower"
full_threshold = 99

[[block]]
block = "memory"
format = " $icon $mem_total_used_percents.eng(w:2) "
format_alt = " $icon_swap $swap_used_percents.eng(w:2) "

[[block]]
block = "sound"
[[block.click]]
button = "left"
cmd = "pavucontrol"

[[block]]
block = "time"
interval = 5
format = " $timestamp.datetime(f:'%a %d/%m %R') "
